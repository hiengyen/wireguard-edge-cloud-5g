global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'cloud-gateway'
    static_configs:
      - targets: ['host.docker.internal:9100']

  - job_name: 'edge-node'
    static_configs:
      # This targets the Edge node over the WireGuard VPN tunnel.
      # Update the IP if your real edge peer does not use 10.8.0.2/32.
      - targets: ['10.8.0.2:9100']
