name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - name: Install linters
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck python3-pip
          python3 -m pip install --user yamllint

      - name: Bash syntax check
        run: |
          while IFS= read -r -d '' file; do
            bash -n "$file"
          done < <(find . -path ./.git -prune -o -name '*.sh' -print0)

      - name: ShellCheck
        run: |
          while IFS= read -r -d '' file; do
            shellcheck "$file"
          done < <(find . -path ./.git -prune -o -name '*.sh' -print0)

      - name: YAML lint
        run: |
          ~/.local/bin/yamllint .github/workflows cloud/monitoring edge/5g-wwan/docker

      - name: Terraform format
        run: terraform -chdir=cloud/terraform/ec2 fmt -check -diff

      - name: Terraform init
        run: terraform -chdir=cloud/terraform/ec2 init -backend=false

      - name: Terraform validate
        run: terraform -chdir=cloud/terraform/ec2 validate
